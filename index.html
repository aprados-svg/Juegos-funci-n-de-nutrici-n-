<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atlas del Cuerpo — La Función de Nutrición</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700;9..144,900&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F1E7CC;
    --paper-dark:#E6D8B4;
    --paper-line:#D9C79C;
    --ink:#2B3226;
    --ink-soft:#5B6650;
    --cream-card:#FBF5E4;

    --digestivo:#C97A2B;
    --digestivo-dark:#8F5518;
    --digestivo-bg:#F7E4CB;

    --respiratorio:#28787A;
    --respiratorio-dark:#1B5556;
    --respiratorio-bg:#DCEEEC;

    --circulatorio:#AE3838;
    --circulatorio-dark:#7A2424;
    --circulatorio-bg:#F5DEDD;

    --excretor:#5C7A38;
    --excretor-dark:#3E5525;
    --excretor-bg:#E4ECD6;

    --gold:#B9891F;
    --gold-dark:#8A6414;
    --ok:#3E7A44;
    --bad:#A63B3B;
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:'Space Grotesk',sans-serif;
    color:var(--ink);
    background:
      radial-gradient(circle at 1px 1px, var(--paper-line) 1px, transparent 1.4px) 0 0/22px 22px,
      var(--paper);
    min-height:100vh;
    line-height:1.45;
  }
  h1,h2,h3,.display{font-family:'Fraunces',serif;}
  .mono{font-family:'JetBrains Mono',monospace;}
  button{font-family:inherit;cursor:pointer;}
  ::selection{background:var(--gold);color:#fff;}

  a{color:inherit;}

  /* ---------- layout shell ---------- */
  #app{max-width:960px;margin:0 auto;padding:20px 18px 70px;}

  header.topbar{
    position:sticky;top:0;z-index:20;
    background:var(--paper);
    border-bottom:2px solid var(--ink);
    margin:0 -18px 22px;
    padding:10px 18px;
    display:flex;align-items:center;justify-content:space-between;
    gap:12px;flex-wrap:wrap;
  }
  .brand{display:flex;align-items:center;gap:10px;}
  .brand .seal{
    width:34px;height:34px;border-radius:50%;
    border:2px solid var(--ink);
    display:flex;align-items:center;justify-content:center;
    font-size:16px;background:var(--cream-card);
  }
  .brand-text{font-family:'Fraunces',serif;font-weight:700;font-size:1.05rem;}
  .brand-text small{display:block;font-family:'Space Grotesk',sans-serif;font-weight:500;font-size:.68rem;color:var(--ink-soft);letter-spacing:.03em;}

  .level-pill{
    display:flex;align-items:center;gap:8px;
    background:var(--cream-card);
    border:1.5px solid var(--ink);
    border-radius:999px;padding:5px 12px;
    font-size:.78rem;font-weight:600;
  }
  .level-pill button{
    background:none;border:none;color:var(--gold-dark);
    font-weight:700;text-decoration:underline;font-size:.75rem;padding:0;
  }

  .passport{display:flex;gap:6px;}
  .stamp-mini{
    width:26px;height:26px;border-radius:50%;
    border:1.5px dashed var(--ink-soft);
    display:flex;align-items:center;justify-content:center;font-size:13px;
    opacity:.35;filter:grayscale(1);
  }
  .stamp-mini.on{opacity:1;filter:none;border-style:solid;border-color:var(--ok);background:#fff;}

  /* ---------- generic card / page ---------- */
  .page-title{font-size:1.9rem;font-weight:700;margin:0 0 6px;}
  .page-sub{color:var(--ink-soft);margin:0 0 22px;font-size:.98rem;}

  .card{
    background:var(--cream-card);
    border:2px solid var(--ink);
    border-radius:14px;
    box-shadow:5px 5px 0 rgba(43,50,38,.14);
    padding:20px;
  }

  .btn{
    display:inline-flex;align-items:center;gap:8px;
    background:var(--ink);color:var(--paper);
    border:2px solid var(--ink);border-radius:10px;
    padding:11px 20px;font-weight:600;font-size:.95rem;
    transition:transform .12s ease, box-shadow .12s ease;
    box-shadow:3px 3px 0 rgba(43,50,38,.3);
  }
  .btn:hover{transform:translate(-1px,-1px);box-shadow:4px 4px 0 rgba(43,50,38,.3);}
  .btn:active{transform:translate(1px,1px);box-shadow:1px 1px 0 rgba(43,50,38,.3);}
  .btn.ghost{background:transparent;color:var(--ink);}
  .btn.gold{background:var(--gold);border-color:var(--gold-dark);color:#fff;}
  .btn:disabled{opacity:.4;cursor:not-allowed;box-shadow:none;transform:none;}
  .btn.small{padding:7px 14px;font-size:.82rem;}

  /* ---------- cover ---------- */
  .hero{text-align:center;padding:26px 10px 8px;}
  .hero h1{font-size:2.6rem;margin:0 0 6px;line-height:1.05;}
  .hero .accent{color:var(--gold-dark);font-style:italic;}
  .hero p.lead{font-size:1.05rem;color:var(--ink-soft);max-width:560px;margin:0 auto 8px;}
  .system-strip{display:flex;justify-content:center;gap:14px;margin:20px 0 8px;flex-wrap:wrap;font-size:1.6rem;}
  .system-strip span{
    width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    border:2px solid var(--ink);background:var(--cream-card);
  }

  .level-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:16px;margin:26px 0;}
  .level-card{
    background:var(--cream-card);border:2px solid var(--ink);border-radius:14px;
    padding:18px;text-align:left;box-shadow:5px 5px 0 rgba(43,50,38,.14);
    transition:transform .12s ease;
  }
  .level-card:hover{transform:translateY(-3px);}
  .level-card h3{margin:0 0 6px;font-size:1.15rem;}
  .level-card p{margin:0 0 14px;font-size:.86rem;color:var(--ink-soft);min-height:64px;}
  .level-card .tag{
    display:inline-block;font-family:'JetBrains Mono',monospace;font-size:.68rem;
    padding:3px 8px;border-radius:6px;margin-bottom:10px;font-weight:700;letter-spacing:.03em;
  }
  .tag.apoyo{background:var(--excretor-bg);color:var(--excretor-dark);}
  .tag.estandar{background:var(--respiratorio-bg);color:var(--respiratorio-dark);}
  .tag.altas{background:var(--circulatorio-bg);color:var(--circulatorio-dark);}

  details.teacher{
    max-width:640px;margin:26px auto 0;background:var(--paper-dark);
    border:1.5px dashed var(--ink-soft);border-radius:12px;padding:14px 18px;text-align:left;
  }
  details.teacher summary{cursor:pointer;font-weight:700;font-size:.92rem;}
  details.teacher .body{margin-top:10px;font-size:.86rem;color:var(--ink-soft);}
  details.teacher ul{margin:8px 0;padding-left:20px;}

  /* ---------- menu de juegos ---------- */
  .game-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px;}
  .game-card{
    background:var(--cream-card);border:2px solid var(--ink);border-radius:14px;padding:20px;
    box-shadow:5px 5px 0 rgba(43,50,38,.14);display:flex;flex-direction:column;gap:10px;
    text-align:left;position:relative;
  }
  .game-card .icon{font-size:2rem;}
  .game-card h3{margin:0;font-size:1.15rem;}
  .game-card p{margin:0;font-size:.85rem;color:var(--ink-soft);flex-grow:1;}
  .game-card .stamp-corner{
    position:absolute;top:14px;right:14px;font-size:1.3rem;
    opacity:0;transform:scale(.5) rotate(-15deg);transition:all .25s ease;
  }
  .game-card .stamp-corner.on{opacity:1;transform:scale(1) rotate(-12deg);}

  /* ---------- tabs de sistema ---------- */
  .sys-tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px;}
  .sys-tab{
    border:2px solid var(--ink);border-radius:10px;padding:8px 14px;font-weight:600;font-size:.86rem;
    background:var(--cream-card);display:flex;align-items:center;gap:6px;
  }
  .sys-tab.active{color:#fff;}
  .sys-tab[data-sys="digestivo"].active{background:var(--digestivo);border-color:var(--digestivo-dark);}
  .sys-tab[data-sys="respiratorio"].active{background:var(--respiratorio);border-color:var(--respiratorio-dark);}
  .sys-tab[data-sys="circulatorio"].active{background:var(--circulatorio);border-color:var(--circulatorio-dark);}
  .sys-tab[data-sys="excretor"].active{background:var(--excretor);border-color:var(--excretor-dark);}
  .sys-tab .dot{width:8px;height:8px;border-radius:50%;}
  .sys-tab[data-sys="digestivo"] .dot{background:var(--digestivo);}
  .sys-tab[data-sys="respiratorio"] .dot{background:var(--respiratorio);}
  .sys-tab[data-sys="circulatorio"] .dot{background:var(--circulatorio);}
  .sys-tab[data-sys="excretor"] .dot{background:var(--excretor);}
  .sys-tab.done::after{content:"✓";margin-left:2px;}

  /* ---------- quiz ---------- */
  .quiz-progress{font-size:.78rem;color:var(--ink-soft);margin-bottom:8px;}
  .quiz-q{font-size:1.15rem;font-weight:600;margin:6px 0 16px;}
  .opt-list{display:flex;flex-direction:column;gap:10px;margin-bottom:16px;}
  .opt{
    text-align:left;background:#fff;border:2px solid var(--ink);border-radius:10px;
    padding:12px 14px;font-size:.92rem;font-weight:500;
  }
  .opt:hover:not(:disabled){background:var(--paper-dark);}
  .opt.correct{background:#DCEFDD;border-color:var(--ok);}
  .opt.wrong{background:#F5DCDC;border-color:var(--bad);}
  .feedback-box{border-radius:10px;padding:12px 14px;font-size:.88rem;margin-bottom:14px;}
  .feedback-box.ok{background:#DCEFDD;border:1.5px solid var(--ok);color:#1F4A24;}
  .feedback-box.bad{background:#F5DCDC;border:1.5px solid var(--bad);color:#5A1E1E;}
  .hint-box{background:var(--paper-dark);border:1.5px dashed var(--ink-soft);border-radius:10px;padding:10px 14px;font-size:.85rem;margin-bottom:12px;}

  /* ---------- memory ---------- */
  .memory-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px;margin-bottom:16px;}
  .mcard{
    aspect-ratio:1/0.85;border:2px solid var(--ink);border-radius:10px;
    background:var(--ink);color:var(--paper);display:flex;align-items:center;justify-content:center;
    text-align:center;font-size:.72rem;font-weight:600;padding:6px;position:relative;
  }
  .mcard.flipped, .mcard.matched{background:#fff;color:var(--ink);}
  .mcard.matched{border-color:var(--ok);background:#DCEFDD;}
  .mcard .back-mark{font-size:1.4rem;}

  /* ---------- sequence / chain ---------- */
  .pool{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:18px;}
  .chip{
    background:#fff;border:2px solid var(--ink);border-radius:10px;padding:9px 12px;font-size:.84rem;
    font-weight:500;max-width:100%;
  }
  .chip.used{opacity:.35;}
  .answer-list{list-style:none;margin:0 0 16px;padding:0;display:flex;flex-direction:column;gap:8px;min-height:52px;
    border:2px dashed var(--ink-soft);border-radius:10px;padding:12px;}
  .answer-list li{
    background:var(--cream-card);border:2px solid var(--ink);border-radius:10px;padding:9px 12px;font-size:.86rem;
    display:flex;gap:10px;align-items:flex-start;
  }
  .answer-list li .num{font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--gold-dark);}
  .answer-list li button{background:none;border:none;margin-left:auto;font-size:.85rem;color:var(--bad);font-weight:700;}
  .answer-list.empty::before{content:"Toca las piezas de abajo para construir el orden aquí ⬇";color:var(--ink-soft);font-size:.85rem;}

  .result-line{display:flex;gap:8px;align-items:flex-start;font-size:.85rem;padding:8px 0;border-top:1px solid var(--paper-line);}
  .result-line:first-child{border-top:none;}
  .result-line .ico{flex-shrink:0;}

  /* ---------- end screen ---------- */
  .end-wrap{text-align:center;padding:20px 10px;}
  .big-stamp{
    width:120px;height:120px;border-radius:50%;border:4px solid var(--ok);
    display:flex;align-items:center;justify-content:center;margin:0 auto 18px;
    font-size:3rem;background:#fff;transform:rotate(-8deg);
    animation:pop .4s ease;
  }
  @keyframes pop{from{transform:scale(.4) rotate(-8deg);opacity:0;}to{transform:scale(1) rotate(-8deg);opacity:1;}}
  .score-line{font-size:1.3rem;font-weight:700;margin-bottom:6px;}
  .actions-row{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:18px;}

  .backrow{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:10px;}

  footer.note{margin-top:40px;text-align:center;font-size:.72rem;color:var(--ink-soft);}

  @media (max-width:520px){
    .hero h1{font-size:1.9rem;}
    .brand-text{font-size:.92rem;}
  }
</style>
</head>
<body>
<div id="app"></div>

<script>
/* ============================================================
   DATOS
   ============================================================ */
const SYSTEM_INFO = {
  digestivo:   {name:"Sistema digestivo",   icon:"🍽️", color:"digestivo"},
  respiratorio:{name:"Sistema respiratorio",icon:"🫁", color:"respiratorio"},
  circulatorio:{name:"Sistema circulatorio",icon:"❤️", color:"circulatorio"},
  excretor:    {name:"Sistema excretor",    icon:"🫘", color:"excretor"}
};
const SYSTEM_ORDER = ["digestivo","respiratorio","circulatorio","excretor"];

const LEVEL_INFO = {
  apoyo:    {name:"Apoyo y refuerzo", tag:"ACNEAE / refuerzo", desc:"Vocabulario sencillo, pistas visibles, menos opciones por pregunta y sin límite de tiempo."},
  estandar: {name:"Estándar", tag:"Nivel de aula", desc:"El nivel habitual de 3º de ESO: preguntas de opción múltiple y procesos completos."},
  altas:    {name:"Altas capacidades", tag:"Ampliación", desc:"Preguntas de razonamiento, relación causa-efecto entre sistemas y retos sin pistas."}
};

const QUIZ = {
 digestivo:{
  apoyo:[
   {q:"¿Dónde empieza la digestión de los alimentos?",options:["En la boca","En el estómago","En el intestino"],correct:0,hint:"Piensa en dónde masticas la comida 🦷",explain:"En la boca los dientes trituran el alimento y la saliva empieza a digerirlo."},
   {q:"¿Qué órgano fabrica la bilis, que ayuda a digerir las grasas?",options:["El hígado","El corazón","Los pulmones"],correct:0,hint:"Es un órgano grande situado en el abdomen 🫘",explain:"El hígado produce la bilis, que se almacena en la vesícula biliar."},
   {q:"Verdadero o falso: los nutrientes pasan a la sangre en el intestino delgado.",options:["Verdadero","Falso"],correct:0,hint:"Ahí están las vellosidades intestinales",explain:"Las vellosidades del intestino delgado absorben los nutrientes hacia la sangre."}
  ],
  estandar:[
   {q:"¿Cuál es el orden correcto del tubo digestivo?",options:["Boca – esófago – estómago – intestino delgado – intestino grueso","Boca – estómago – esófago – intestino grueso – intestino delgado","Esófago – boca – estómago – intestino delgado – intestino grueso","Boca – intestino delgado – estómago – esófago – intestino grueso"],correct:0,explain:"El alimento recorre boca, esófago, estómago, intestino delgado e intestino grueso."},
   {q:"¿Qué enzima de la saliva empieza a digerir el almidón?",options:["La amilasa salival","La pepsina","La lipasa","La tripsina"],correct:0,explain:"La amilasa salival descompone el almidón ya en la boca."},
   {q:"¿Cuál es la función principal del intestino grueso?",options:["Absorber agua y formar las heces","Digerir las proteínas","Producir bilis","Absorber la mayoría de los nutrientes"],correct:0,explain:"El intestino grueso absorbe agua y compacta los restos no digeridos."}
  ],
  altas:[
   {q:"Si una persona no tuviera vesícula biliar, ¿qué proceso se vería más afectado y por qué?",options:["La digestión de las grasas, porque la bilis las emulsiona facilitando la acción de la lipasa","La digestión de las proteínas, porque la bilis activa la pepsina","La absorción de agua en el intestino grueso","Ninguno, la vesícula no participa en la digestión"],correct:0,explain:"La bilis emulsiona las grasas en gotas pequeñas, aumentando la superficie para que la lipasa actúe."},
   {q:"¿Por qué el estómago no se autodigiere pese a producir ácido clorhídrico y pepsina?",options:["Porque su mucosa segrega una capa de moco protector","Porque el ácido se neutraliza antes de llegar al estómago","Porque la pepsina solo actúa en el intestino","Porque el estómago no contiene enzimas"],correct:0,explain:"El moco gástrico protege la pared del estómago frente a su propio ácido y enzimas."},
   {q:"Si el páncreas dejara de producir jugo pancreático, ¿qué consecuencia directa tendría?",options:["Disminuiría la digestión de grasas, proteínas e hidratos en el intestino delgado","Se detendría por completo la absorción de agua","Aumentaría la producción de saliva","No tendría ningún efecto relevante"],correct:0,explain:"El jugo pancreático aporta enzimas clave para digerir grasas, proteínas e hidratos en el intestino."}
  ]
 },
 respiratorio:{
  apoyo:[
   {q:"¿Por dónde entra el aire primero al respirar?",options:["Por la nariz","Por los pulmones","Por el estómago"],correct:0,hint:"Es el primer órgano del recorrido 👃",explain:"El aire entra por las fosas nasales, donde se filtra y calienta."},
   {q:"¿Dónde se intercambian el oxígeno y el dióxido de carbono?",options:["En los alvéolos","En la tráquea","En la laringe"],correct:0,hint:"Son unas bolsitas diminutas dentro del pulmón",explain:"En los alvéolos pulmonares el O2 pasa a la sangre y el CO2 sale de ella."},
   {q:"Verdadero o falso: el diafragma ayuda a que entre y salga el aire de los pulmones.",options:["Verdadero","Falso"],correct:0,hint:"Es un músculo debajo de los pulmones",explain:"El diafragma se contrae y relaja para permitir la inspiración y la espiración."}
  ],
  estandar:[
   {q:"Ordena correctamente el recorrido del aire.",options:["Fosas nasales – faringe – laringe – tráquea – bronquios – alvéolos","Fosas nasales – laringe – faringe – bronquios – tráquea – alvéolos","Faringe – fosas nasales – tráquea – laringe – bronquios – alvéolos","Tráquea – fosas nasales – faringe – laringe – bronquios – alvéolos"],correct:0,explain:"El aire pasa por fosas nasales, faringe, laringe, tráquea, bronquios y alvéolos."},
   {q:"¿Cómo se llama el proceso de intercambio de gases en los alvéolos?",options:["Hematosis","Ventilación","Fonación","Excreción"],correct:0,explain:"La hematosis es el intercambio de O2 y CO2 entre el aire alveolar y la sangre."},
   {q:"¿Qué molécula de la sangre transporta el oxígeno?",options:["La hemoglobina","La glucosa","La urea","La bilis"],correct:0,explain:"La hemoglobina de los glóbulos rojos se une al oxígeno para transportarlo."}
  ],
  altas:[
   {q:"Durante un ejercicio intenso, ¿qué ocurre con la frecuencia respiratoria y por qué?",options:["Aumenta, porque las células necesitan más O2 y generan más CO2 que eliminar","Disminuye, porque el cuerpo ahorra energía","No cambia, la respiración es independiente del ejercicio","Solo aumenta la frecuencia cardíaca, no la respiratoria"],correct:0,explain:"Más actividad celular implica más consumo de O2 y más producción de CO2, así que se respira más rápido para compensarlo."},
   {q:"¿Por qué los alvéolos son tan eficaces para el intercambio gaseoso?",options:["Porque tienen paredes muy finas, gran superficie total y están rodeados de capilares","Porque tienen paredes gruesas que retienen el aire","Porque están conectados directamente al corazón","Porque producen moco que atrapa el oxígeno"],correct:0,explain:"Pared fina + gran superficie + red de capilares = intercambio de gases muy rápido y eficiente."},
   {q:"Una persona con los alvéolos dañados (por ejemplo, por tabaco) tendría...",options:["Menor superficie de intercambio y por tanto menos O2 disponible en sangre","Mayor capacidad de absorber oxígeno","Ningún cambio en el transporte de gases","Un aumento del número de alvéolos sanos"],correct:0,explain:"Al dañarse los alvéolos se reduce la superficie de intercambio, y llega menos oxígeno a la sangre."}
  ]
 },
 circulatorio:{
  apoyo:[
   {q:"¿Qué órgano bombea la sangre por todo el cuerpo?",options:["El corazón","El estómago","El pulmón"],correct:0,hint:"Está en el pecho y late 💓",explain:"El corazón es una bomba muscular que impulsa la sangre por todo el cuerpo."},
   {q:"¿Qué vasos llevan la sangre desde el corazón al resto del cuerpo?",options:["Las arterias","Las venas","Los capilares"],correct:0,hint:"Empiezan por 'a', igual que 'a'lejarse del corazón",explain:"Las arterias transportan la sangre desde el corazón hacia el cuerpo."},
   {q:"Verdadero o falso: la sangre transporta nutrientes y oxígeno a las células.",options:["Verdadero","Falso"],correct:0,hint:"Piensa en todo lo que necesitan tus células para vivir",explain:"La sangre reparte nutrientes, oxígeno y también recoge los desechos."}
  ],
  estandar:[
   {q:"¿Qué vasos sanguíneos llevan la sangre de vuelta al corazón?",options:["Las venas","Las arterias","Los capilares","Los alvéolos"],correct:0,explain:"Las venas devuelven la sangre al corazón tras pasar por el cuerpo."},
   {q:"¿Cuántas circulaciones tiene el ser humano y cómo se llaman?",options:["Dos: circulación mayor (sistémica) y menor (pulmonar)","Una sola circulación general","Tres circulaciones distintas","Ninguna, la sangre no circula en circuito cerrado"],correct:0,explain:"La circulación mayor lleva sangre a todo el cuerpo; la menor, a los pulmones."},
   {q:"¿Qué parte de la sangre transporta los glóbulos rojos, blancos y plaquetas?",options:["El plasma","La bilis","La linfa","La orina"],correct:0,explain:"El plasma es la parte líquida de la sangre donde viajan las células sanguíneas."}

function emptyStamps(){return {memory:false,quiz:false,sequence:false,chain:false};}

  stamps:{apoyo:emptyStamps(),estandar:emptyStamps(),altas:emptyStamps()},
  quiz:null,
  memory:null,
  sequence:null,
  chain:null
};

function shuffle(arr){
  const a=arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

/* ============================================================
   INICIALIZADORES DE JUEGO
   ============================================================ */
function startQuiz(){
  state.quiz={system:null,qIndex:0,score:0,selected:null,checked:false,systemsDone:[]};
  state.screen="quiz";
  render();
}
function pickQuizSystem(sys){
  state.quiz.system=sys;
  state.quiz.qIndex=0;
  state.quiz.score=0;
  state.quiz.selected=null;
  state.quiz.checked=false;
  render();
}

function startMemory(){
  const pairs = MEMORY[state.level];
  let cards=[];
  pairs.forEach((p,idx)=>{
    cards.push({pairId:idx,text:p[0]});
    cards.push({pairId:idx,text:p[1]});
  });
  cards=shuffle(cards).map((c,i)=>({...c,uid:i}));
  state.memory={deck:cards,flipped:[],matched:[],attempts:0,totalPairs:pairs.length};
  state.screen="memory";
  render();
}

function startSequence(){
  state.sequence={system:null,pool:[],answer:[],checked:false};
  state.screen="sequence";
  render();
}
function pickSeqSystem(sys){
  const data=SEQUENCES[sys];
  let items;
  if(state.level==="apoyo"){
    items = data.apoyo.map((t,i)=>({id:"a"+i,text:t,correctIndex:i}));
  } else if(state.level==="estandar"){
    items = data.full.map((t,i)=>({id:"f"+i,text:t,correctIndex:i}));
  } else {
    items = data.full.map((t,i)=>({id:"f"+i,text:t,correctIndex:i,valid:true}));
    data.distractores.forEach((t,i)=>items.push({id:"d"+i,text:t,correctIndex:-1,valid:false}));
  }
  state.sequence={system:sys,pool:shuffle(items),answer:[],checked:false,level:state.level};
  render();
}

function startChain(){
  const items = CHAIN[state.level].map((t,i)=>({id:"c"+i,text:t,correctIndex:i}));
  state.chain={pool:shuffle(items),answer:[],checked:false};
  state.screen="chain";
  render();
}

      return `<button class="sys-tab" data-sys="${sys}" data-action="seq-pick-system"><span class="dot"></span>${inf.icon} ${inf.name.replace('Sistema ','')}</button>`;
    }).join("")}</div>

  }
  const info=SYSTEM_INFO[sq.system];
  const remaining = sq.pool.filter(it=>!sq.answer.find(a=>a.id===it.id));
  return `

function sequenceResult(sq){
  const data = SEQUENCES[sq.system];
  const correctOrder = (sq.level==="apoyo" ? data.apoyo : data.full);
  const correctCount = sq.answer.filter((it,i)=>it.correctIndex===i && it.valid!==false).length;
  const includesDistractor = sq.answer.some(it=>it.valid===false);
  const isPerfect = sq.answer.length===correctOrder.length && correctCount===correctOrder.length && !includesDistractor;
  return `
  <div class="feedback-box ${isPerfect?'ok':'bad'}">
    ${isPerfect ? "✅ ¡Orden perfecto!" : "❌ El orden no es correcto del todo. Revisa la secuencia correcta abajo:"}
  </div>
  <div style="margin-bottom:14px;">
    ${correctOrder.map((t,i)=>`<div class="result-line"><span class="ico mono">${i+1}.</span><span>${t}</span></div>`).join("")}
  </div>
  <button class="btn gold" data-action="seq-finish">Continuar 🎉</button>
  `;
}

/* ---------- CHAIN ---------- */
function chainScreen(){
  const ch = state.chain;
  const remaining = ch.pool.filter(it=>!ch.answer.find(a=>a.id===it.id));
  return `
  ${backrow("Reto de Integración","Une los 4 sistemas: reconstruye el camino completo de la nutrición.")}
  <div class="card">
    <ol class="answer-list ${ch.answer.length===0?'empty':''}">
      ${ch.answer.map((it,i)=>`<li><span class="num">${i+1}</span><span>${it.text}</span>${!ch.checked?`<button data-action="chain-remove" data-id="${it.id}">quitar</button>`:''}</li>`).join("")}
    </ol>
    ${!ch.checked ? `
      <div class="pool">
        ${remaining.map(it=>`<button class="chip" data-action="chain-add" data-id="${it.id}">${it.text}</button>`).join("")}
      </div>
      <button class="btn gold" data-action="chain-check" ${ch.answer.length===0?'disabled':''}>Comprobar cadena</button>
    ` : chainResult(ch)}
  </div>
  `;
}

function chainResult(ch){
  const correctOrder = CHAIN[state.level];
  const correctCount = ch.answer.filter((it,i)=>it.correctIndex===i).length;
  const isPerfect = ch.answer.length===correctOrder.length && correctCount===correctOrder.length;
  return `
  <div class="feedback-box ${isPerfect?'ok':'bad'}">
    ${isPerfect ? "✅ ¡Cadena completa y correcta! Has conectado los cuatro sistemas." : "❌ Aún no está en el orden correcto. Aquí tienes la cadena real:"}
  </div>
  <div style="margin-bottom:14px;">
    ${correctOrder.map((t,i)=>`<div class="result-line"><span class="ico mono">${i+1}.</span><span>${t}</span></div>`).join("")}
  </div>
  <button class="btn gold" data-action="chain-finish">Continuar 🎉</button>
  `;
}

/* ---------- END ---------- */
function endScreen(){
  const g = state._lastGame;
  const m = GAME_META[g];
  return `
  ${backrow(m.name, "Resultado")}
  <div class="card end-wrap">
    <div class="big-stamp">${m.icon}</div>
    <div class="score-line">${state._lastScoreText || "¡Juego completado!"}</div>
    <p style="color:var(--ink-soft);font-size:.9rem;">Sello añadido a tu pasaporte de nivel <strong>${LEVEL_INFO[state.level].name}</strong>.</p>
    <div class="actions-row">
      <button class="btn ghost" data-action="open-game" data-game="${g}">🔁 Repetir</button>
      <button class="btn gold" data-action="go-menu">📖 Volver al mapa</button>
    </div>
  </div>
  `;
}

/* ---------- helpers ---------- */
function backrow(title,sub){
  return `
  <div class="backrow">
    <div>
      <h2 class="page-title" style="font-size:1.5rem;margin-bottom:2px;">${title}</h2>
      <p class="page-sub" style="margin:0;">${sub}</p>
    </div>
    <button class="btn ghost small" data-action="go-menu">← Volver al mapa</button>
  </div>`;
}

/* ============================================================
   EVENTOS
   ============================================================ */
appEl.addEventListener("click", (e)=>{
  const el = e.target.closest("[data-action]");
  if(!el) return;
  const action = el.dataset.action;

  if(action==="choose-level"){ state.level=el.dataset.level; state.screen="menu"; render(); return; }
  if(action==="go-cover"){ state.screen="cover"; render(); return; }
  if(action==="go-menu"){ state.screen="menu"; render(); return; }

  if(action==="open-game"){
    const g = el.dataset.game;
    if(g==="memory") startMemory();
    else if(g==="quiz") startQuiz();
    else if(g==="sequence") startSequence();
    else if(g==="chain") startChain();
    return;
  }

  /* --- QUIZ --- */
  if(action==="quiz-pick-system"){ pickQuizSystem(el.dataset.sys); return; }
  if(action==="quiz-hint"){ state.quiz._showHint=true; render(); return; }
  if(action==="quiz-answer"){
    const qz=state.quiz;
    if(qz.checked) return;
    qz.selected = parseInt(el.dataset.i,10);
    qz.checked = true;
    const qs = QUIZ[qz.system][state.level];
    if(qz.selected === qs[qz.qIndex].correct) qz.score++;
    render();
    return;
  }
  if(action==="quiz-next"){
    const qz=state.quiz;
    const qs = QUIZ[qz.system][state.level];
    if(qz.qIndex+1 < qs.length){
      qz.qIndex++; qz.selected=null; qz.checked=false; qz._showHint=false;
      render();
    } else {
      if(!qz.systemsDone.includes(qz.system)) qz.systemsDone.push(qz.system);
      if(qz.systemsDone.length === SYSTEM_ORDER.length){
        state.stamps[state.level].quiz = true;
        state._lastGame="quiz";
        state._lastScoreText = "Has completado el quiz de los 4 sistemas.";
        state.screen="end";
      } else {
        qz.system=null;
      }
      render();
    }
    return;
  }

  /* --- MEMORY --- */
  if(action==="memory-flip"){
    const m = state.memory;
    const uid = parseInt(el.dataset.uid,10);
    if(m.flipped.includes(uid) || m.matched.includes(uid)) return;
    if(m.flipped.length>=2) return;
    m.flipped.push(uid);
    if(m.flipped.length===2){
      m.attempts++;
      const [u1,u2]=m.flipped;
      const c1=m.deck.find(c=>c.uid===u1), c2=m.deck.find(c=>c.uid===u2);
      if(c1.pairId===c2.pairId){
        m.matched.push(u1,u2);
        m.flipped=[];
        render();
      } else {
        render();
        setTimeout(()=>{ m.flipped=[]; render(); }, 850);
      }
      return;
    }
    render();
    return;
  }
  if(action==="memory-finish"){
    state.stamps[state.level].memory = true;
    state._lastGame="memory";
    state._lastScoreText = "Parejas encontradas en "+state.memory.attempts+" intentos.";
    state.screen="end";
    render();
    return;
  }

  /* --- SEQUENCE --- */
  if(action==="seq-pick-system"){ pickSeqSystem(el.dataset.sys); return; }
  if(action==="seq-add"){
    const sq=state.sequence;
    const item = sq.pool.find(i=>i.id===el.dataset.id);
    sq.answer.push(item);
    render();
    return;
  }
  if(action==="seq-remove"){
    const sq=state.sequence;
    sq.answer = sq.answer.filter(i=>i.id!==el.dataset.id);
    render();
    return;
  }
  if(action==="seq-check"){ state.sequence.checked=true; render(); return; }
  if(action==="seq-finish"){
    state.stamps[state.level].sequence = true;
    state._lastGame="sequence";
    state._lastScoreText = "Secuencia de "+SYSTEM_INFO[state.sequence.system].name+" completada.";
    state.screen="end";
    render();
    return;
  }

  /* --- CHAIN --- */
  if(action==="chain-add"){
    const ch=state.chain;
    const item = ch.pool.find(i=>i.id===el.dataset.id);
    ch.answer.push(item);
    render();
    return;
  }
  if(action==="chain-remove"){
    const ch=state.chain;
    ch.answer = ch.answer.filter(i=>i.id!==el.dataset.id);
    render();
    return;
  }
  if(action==="chain-check"){ state.chain.checked=true; render(); return; }
  if(action==="chain-finish"){
    state.stamps[state.level].chain = true;
    state._lastGame="chain";
    state._lastScoreText = "Cadena de integración completada.";
    state.screen="end";
    render();
    return;
  }
});

render();
</script>
</body>
</html>
